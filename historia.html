<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5EDD8;
    --deep-blue: #1A1F3C;
    --mid-blue: #2D3561;
    --warm-dark: #0F0E0B;
    --parchment: #FAF6EE;
    --red-byzantine: #8B1A1A;
    --cream: #F2EDE4;
    --text-dark: #1A1715;
    --text-mid: #4A4035;
    --text-light: #9A8E7E;
    --border: rgba(201,168,76,0.25);
    --shadow: 0 4px 30px rgba(15,14,11,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  html { scroll-behavior:smooth; }
  body { font-family:'EB Garamond',Georgia,serif; background:var(--parchment); color:var(--text-dark); overflow-x:hidden; }
 
  /* LANG BAR */
  .lang-bar { background:var(--deep-blue); padding:8px 0; }
  .lang-bar .container { display:flex; justify-content:space-between; align-items:center; padding:0 40px; }
  .lang-bar-left { display:flex; align-items:center; gap:10px; }
  .icon-link { display:flex; align-items:center; color:rgba(255,255,255,0.7); text-decoration:none; transition:color .25s; }
  .icon-link:hover { color:#fff; }
  .lang-bar-right { display:flex; align-items:center; gap:8px; }
  .lang-label { font-family:'Noto Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:#fff; margin-right:4px; }
  .lang-btn { background:transparent; border:1px solid rgba(201,168,76,0.4); color:rgba(255,255,255,0.65); padding:4px 12px; font-family:'Noto Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .25s; border-radius:2px; }
  .lang-btn:hover,.lang-btn.active { background:var(--gold); border-color:var(--gold); color:var(--deep-blue); }
 
  /* HEADER */
  header { background:var(--deep-blue); position:relative; overflow:hidden; }
  header::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 60% 80% at 50% -20%,rgba(201,168,76,.12) 0%,transparent 70%), url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 29 L43 44 L30 35 L17 44 L22 29 L10 20 L25 20Z' fill='none' stroke='rgba(201,168,76,0.06)' stroke-width='1'/%3E%3C/svg%3E") repeat; pointer-events:none; }
  .header-inner { position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between; padding:28px 40px; }
  .church-identity { display:flex; align-items:center; gap:20px; }
  .cross-icon { width:52px; height:52px; flex-shrink:0; border-radius:50%; object-fit:cover; }
  .church-name-block h1 { font-family:'Cinzel',serif; font-size:22px; font-weight:700; color:var(--gold-light); letter-spacing:1px; line-height:1.2; }
  .church-name-block p { font-family:'EB Garamond',serif; font-style:italic; font-size:13.5px; color:rgba(255,255,255,.5); margin-top:3px; letter-spacing:0.5px; }
 
  /* ─── NAVIGATION ─── */
  nav { background: var(--mid-blue); border-top: 1px solid rgba(201,168,76,0.2); border-bottom: 1px solid rgba(201,168,76,0.2); position: sticky; top: 0; z-index: 100; }
  .nav-inner { display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 0; flex-wrap: wrap; }
  .nav-link { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.65); text-decoration: none; padding: 16px 20px; position: relative; transition: color 0.25s; white-space: nowrap; }
  .nav-link::after { content: ''; position: absolute; bottom: 0; left: 50%; right: 50%; height: 2px; background: var(--gold); transition: left 0.3s, right 0.3s; }
  .nav-link:hover { color: var(--gold-light); }
  .nav-link:hover::after, .nav-link.active::after { left: 15%; right: 15%; }
  .nav-link.active { color: var(--gold-light); }
 
  /* PAGE TITLE */
  .page-title-section { background:var(--deep-blue); padding:60px 40px 50px; text-align:center; position:relative; overflow:hidden; }
  .page-title-section::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 70% 100% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 70%); pointer-events:none; }
  .eyebrow { font-family:'Noto Sans',sans-serif; font-size:10px; font-weight:500; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; justify-content:center; gap:12px; position:relative; z-index:1; }
  .eyebrow::before,.eyebrow::after { content:''; display:block; width:40px; height:1px; background:var(--gold); opacity:.5; }
  .page-title-section h2 { font-family:'Cinzel',serif; font-size:clamp(32px,5vw,52px); font-weight:900; color:#fff; letter-spacing:4px; text-transform:uppercase; position:relative; z-index:1; }
  .title-line { width:80px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:18px auto 0; }
 
  /* HISTORY BODY */
  .history-body { max-width:820px; margin:0 auto; padding:70px 40px 60px; }
  .chapter { margin-bottom:52px; }
  .chapter-date { font-family:'Noto Sans',sans-serif; font-size:10px; font-weight:500; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:10px; }
  .chapter-title { font-family:'Cinzel',serif; font-size:17px; font-weight:700; color:var(--deep-blue); letter-spacing:.8px; margin-bottom:20px; display:flex; align-items:center; gap:14px; }
  .chapter-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--gold) 0%,transparent 100%); opacity:.5; }
  .history-body p { font-family:'EB Garamond',serif; font-size:18.5px; line-height:1.95; color:var(--text-mid); margin-bottom:18px; }
  .history-body p:last-child { margin-bottom:0; }
  blockquote { border-left:3px solid var(--gold); margin:36px 0; padding:18px 28px; background:var(--cream); }
  blockquote p { font-style:italic; font-size:19px; color:var(--deep-blue); margin-bottom:0; }
  .section-divider { display:flex; align-items:center; justify-content:center; gap:14px; margin:50px 0; color:var(--gold); font-size:14px; letter-spacing:8px; }
  .section-divider::before,.section-divider::after { content:''; flex:1; height:1px; background:var(--gold); opacity:.3; }
 
  /* PHOTOS */
  .photos-section { max-width:820px; margin:0 auto; padding:0 40px 80px; }
  .photos-heading { font-family:'Cinzel',serif; font-size:13px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--deep-blue); margin-bottom:24px; display:flex; align-items:center; gap:14px; }
  .photos-heading::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--gold) 0%,transparent 100%); opacity:.5; }
  .photos-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .photo-item { position:relative; aspect-ratio:4/3; overflow:hidden; cursor:pointer; border:1px solid var(--border); background:linear-gradient(135deg,var(--deep-blue),var(--mid-blue)); opacity:0; transform:translateY(20px); transition:opacity .5s ease,transform .5s ease,box-shadow .3s; }
  .photo-item.visible { opacity:1; transform:translateY(0); }
  .photo-item img { width:100%; height:100%; object-fit:cover; transition:transform .5s ease; display:block; }
  .photo-item:hover img { transform:scale(1.06); }
  .photo-item:hover { box-shadow:0 10px 40px rgba(201,168,76,.15); }
  .photo-item::after { content:''; position:absolute; inset:0; background:rgba(26,31,60,.35); opacity:0; transition:opacity .3s; }
  .photo-item:hover::after { opacity:1; }
  .zoom-icon { position:absolute; bottom:12px; right:12px; width:34px; height:34px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:2; opacity:0; transform:scale(.7); transition:opacity .3s,transform .3s; }
  .photo-item:hover .zoom-icon { opacity:1; transform:scale(1); }
 
  /* LIGHTBOX */
  .lightbox { position:fixed; inset:0; background:rgba(10,12,25,.96); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
  .lightbox.open { opacity:1; pointer-events:all; }
  .lightbox-backdrop { position:absolute; inset:0; cursor:pointer; }
  .lightbox-content { position:relative; z-index:1; max-width:90vw; max-height:90vh; display:flex; flex-direction:column; align-items:center; }
  .lightbox-img-wrap { max-width:90vw; max-height:82vh; display:flex; align-items:center; justify-content:center; }
  .lightbox-img-wrap img { max-width:85vw; max-height:80vh; object-fit:contain; border:1px solid rgba(201,168,76,.2); box-shadow:0 20px 80px rgba(0,0,0,.7); display:block; }
  .lightbox-placeholder { width:min(600px,85vw); height:min(420px,70vh); background:linear-gradient(135deg,var(--deep-blue),var(--mid-blue)); border:1px solid rgba(201,168,76,.2); }
  .lightbox-close { position:fixed; top:24px; right:28px; width:44px; height:44px; background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.3); border-radius:50%; color:var(--gold-light); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; z-index:2; line-height:1; }
  .lightbox-close:hover { background:var(--gold); color:var(--deep-blue); transform:rotate(90deg); }
  .lightbox-arrow { position:fixed; top:50%; transform:translateY(-50%); width:48px; height:48px; background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.25); border-radius:50%; color:var(--gold-light); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; z-index:2; }
  .lightbox-arrow:hover { background:var(--gold); color:var(--deep-blue); }
  .lightbox-arrow.prev { left:20px; }
  .lightbox-arrow.next { right:20px; }
  .lightbox-counter { margin-top:14px; font-family:'Noto Sans',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(201,168,76,.5); }
 
  /* FOOTER */
  footer { background:var(--warm-dark); padding:60px 0 0; }
  .footer-inner { max-width:1200px; margin:0 auto; padding:0 40px 50px; display:grid; grid-template-columns:1.5fr 1fr; gap:50px; }
  .footer-brand p { font-family:'EB Garamond',serif; font-style:italic; font-size:14.5px; color:rgba(255,255,255,.35); margin-top:16px; line-height:1.7; }
  .footer-col h5 { font-family:'Cinzel',serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid rgba(201,168,76,.2); }
  .footer-links { list-style:none; }
  .footer-links li { padding:6px 0; }
  .footer-links a, .footer-links span { font-family:'EB Garamond',serif; font-size:15px; color:rgba(255,255,255,.45); text-decoration:none; transition:color .2s; display:flex; align-items:center; gap:8px; }
  .footer-links a::before { content:'›'; color:var(--gold); opacity:0; transition:opacity .2s; }
  .footer-links a:hover { color:rgba(255,255,255,.8); }
  .footer-links a:hover::before { opacity:1; }
  .footer-bottom { border-top:1px solid rgba(255,255,255,.06); padding:20px 40px; max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:flex-start; }
  .footer-bottom p { font-family:'Noto Sans',sans-serif; font-size:11px; color:rgba(255,255,255,.25); letter-spacing:.5px; }
 
  /* RESPONSIVE */
  @media (max-width: 900px) {
    .footer-inner { grid-template-columns: 1fr 1fr; }
    .header-inner { flex-direction: column; gap: 16px; text-align: center; }
    .nav-inner { overflow-x: auto; justify-content: flex-start; padding: 0 20px; }
  }
 
  @media (max-width: 600px) {
    .lang-bar .container { padding: 0 16px; }
    .lang-bar-left { gap: 6px; }
    .icon-link svg { width: 18px; height: 18px; }
    .header-inner { padding: 20px; flex-direction: column; gap: 16px; text-align: center; }
    .church-name-block h1 { font-size: 16px; }
    .church-name-block p { font-size: 12px; }
    .nav-link { font-size: 10px; padding: 14px 12px; letter-spacing: 1px; }
    .page-title-section { padding: 40px 20px 36px; }
    .page-title-section h2 { font-size: 28px; letter-spacing: 2px; }
    .history-body { padding: 40px 20px 40px; }
    .history-body p { font-size: 16px; line-height: 1.8; }
    blockquote { padding: 14px 18px; margin: 24px 0; }
    blockquote p { font-size: 16px; }
    .chapter-title { font-size: 15px; }
    .photos-section { padding-left: 20px; padding-right: 20px; }
    .photos-grid { grid-template-columns: 1fr; }
    .lightbox-arrow { display: none; }
    .footer-inner { grid-template-columns: 1fr; gap: 30px; padding: 0 20px 40px; }
    .footer-bottom { padding: 16px 20px; flex-direction: column; gap: 6px; text-align: center; }
  }
 
  @media (max-width: 380px) {
    .church-name-block h1 { font-size: 14px; }
    .page-title-section h2 { font-size: 22px; }
  }
</style>

  // Chapter 1
  ch1_date: { sq: 'Shekulli XIX', en: '19th Century', el: '19\u03bf\u03c2 \u0391\u03b9\u03ce\u03bd\u03b1\u03c2' },
  ch1_title: {
    sq: 'Fillimet e Kishës',
    en: 'The Founding of the Church',
    el: '\u03a4\u03b1 \u0398\u03b5\u03bc\u03ad\u03bb\u03b9\u03b1 \u03c4\u03b7\u03c2 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1\u03c2'
  },
  ch1_p1: {
    sq: 'Kisha Orthodhokse "Profeti Ilia" është një ndër kishat më të vjetra dhe më të dashura të qytetit të Korçës. Historia e saj fillon në shekullin e XIX-të, në një periudhë kur komuniteti orthodhoks i Korçës po konsolidohej dhe po ndërtonte themelet shpirtërore të jetës së tij fetare. Kisha u ngrit me duart dhe sakrificën e besimtarëve të thjeshtë korçarë, të cilët e donin fenë dhe traditat e tyre me tërë zemrën.',
    en: 'The Orthodox Church of "Prophet Elijah" is one of the oldest and most beloved churches in the city of Korçë. Its history begins in the 19th century, a period when the Orthodox community of Korçë was consolidating and building the spiritual foundations of its religious life. The church was raised by the hands and sacrifice of simple Orthodox faithful of Korçë, who loved their faith and traditions with all their hearts.',
    el: '\u0397 \u039f\u03c1\u03b8\u03cc\u03b4\u03bf\u03be\u03b7 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb \u03b5\u03af\u03bd\u03b1\u03b9 \u03bc\u03b9\u03b1 \u03b1\u03c0\u03cc \u03c4\u03b9\u03c2 \u03c0\u03b1\u03bb\u03b1\u03b9\u03cc\u03c4\u03b5\u03c1\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03b1\u03b3\u03b1\u03c0\u03b7\u03bc\u03ad\u03bd\u03b5\u03c2 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b5\u03c2 \u03c4\u03b7\u03c2 \u03c0\u03cc\u03bb\u03b7\u03c2 \u03c4\u03b7\u03c2 \u039a\u03bf\u03c1\u03c5\u03c4\u03c3\u03ac\u03c2. \u0397 \u03b9\u03c3\u03c4\u03bf\u03c1\u03af\u03b1 \u03c4\u03b7\u03c2 \u03b1\u03c1\u03c7\u03af\u03b6\u03b5\u03b9 \u03c4\u03bf\u03bd 19\u03bf \u03b1\u03b9\u03ce\u03bd\u03b1, \u03cc\u03c4\u03b1\u03bd \u03b7 \u03bf\u03c1\u03b8\u03cc\u03b4\u03bf\u03be\u03b7 \u03ba\u03bf\u03b9\u03bd\u03cc\u03c4\u03b7\u03c4\u03b1 \u03c4\u03b7\u03c2 \u039a\u03bf\u03c1\u03c5\u03c4\u03c3\u03ac\u03c2 \u03b5\u03b4\u03c1\u03b1\u03b9\u03c9\u03bd\u03cc\u03c4\u03b1\u03bd \u03ba\u03b1\u03b9 \u03ad\u03c7\u03c4\u03b9\u03b6\u03b5 \u03c4\u03b1 \u03c0\u03bd\u03b5\u03c5\u03bc\u03b1\u03c4\u03b9\u03ba\u03ac \u03c4\u03b7\u03c2 \u03b8\u03b5\u03bc\u03ad\u03bb\u03b9\u03b1.'
  },
  ch1_p2: {
    sq: 'Ndërtimi i kishës ishte një projekt i gjithë komunitetit. Burra dhe gra të moshave të ndryshme kontribuan me punë, me gur dhe me besimin e tyre të palëkundur. Arkitektura e kishës pasqyron stilin karakteristik të kishave orthodhokse të Ballkanit, me elemente bizantine që e bëjnë atë unike në peizazhin urban të Korçës.',
    en: 'The construction of the church was a community-wide project. Men and women of all ages contributed with labor, stone, and their unwavering faith. The architecture reflects the characteristic style of Balkan Orthodox churches, with Byzantine elements that make it unique in the urban landscape of Korçë.',
    el: '\u0397 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ae \u03c4\u03b7\u03c2 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1\u03c2 \u03ae\u03c4\u03b1\u03bd \u03ad\u03bd\u03b1 \u03ba\u03bf\u03b9\u03bd\u03bf\u03c4\u03b9\u03ba\u03cc \u03ad\u03c1\u03b3\u03bf. \u0386\u03bd\u03b4\u03c1\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03b3\u03c5\u03bd\u03b1\u03af\u03ba\u03b5\u03c2 \u03ba\u03ac\u03b8\u03b5 \u03b7\u03bb\u03b9\u03ba\u03af\u03b1\u03c2 \u03c3\u03c5\u03bd\u03b5\u03b9\u03c3\u03ad\u03c6\u03b5\u03c1\u03b1\u03bd \u03bc\u03b5 \u03b5\u03c1\u03b3\u03b1\u03c3\u03af\u03b1, \u03c0\u03ad\u03c4\u03c1\u03b1 \u03ba\u03b1\u03b9 \u03b1\u03ba\u03bb\u03cc\u03bd\u03b7\u03c4\u03b7 \u03c0\u03af\u03c3\u03c4\u03b7. \u0397 \u03b1\u03c1\u03c7\u03b9\u03c4\u03b5\u03ba\u03c4\u03bf\u03bd\u03b9\u03ba\u03ae \u03b1\u03bd\u03c4\u03b9\u03ba\u03b1\u03c4\u03bf\u03c0\u03c4\u03c1\u03af\u03b6\u03b5\u03b9 \u03c4\u03bf\u03bd \u03b2\u03b1\u03bb\u03ba\u03b1\u03bd\u03b9\u03ba\u03cc \u03bf\u03c1\u03b8\u03cc\u03b4\u03bf\u03be\u03bf \u03c1\u03c5\u03b8\u03bc\u03cc \u03bc\u03b5 \u03b2\u03c5\u03b6\u03b1\u03bd\u03c4\u03b9\u03bd\u03ac \u03c3\u03c4\u03bf\u03b9\u03c7\u03b5\u03af\u03b1.'
  },
 
  // Quote 1
  quote1: {
    sq: '"Kisha nuk është vetëm ndërtesë guri — ajo është zemra shpirtërore e bashkësisë, vendi ku brezat takohen me Perëndinë."',
    en: '"The church is not merely a stone building — it is the spiritual heart of the community, the place where generations meet God."',
    el: '\u00ab\u0397 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u03b4\u03b5\u03bd \u03b5\u03af\u03bd\u03b1\u03b9 \u03b1\u03c0\u03bb\u03ce\u03c2 \u03bc\u03b9\u03b1 \u03c0\u03ad\u03c4\u03c1\u03b9\u03bd\u03b7 \u03ba\u03b1\u03c4\u03b1\u03c3\u03ba\u03b5\u03c5\u03ae \u2014 \u03b5\u03af\u03bd\u03b1\u03b9 \u03b7 \u03c0\u03bd\u03b5\u03c5\u03bc\u03b1\u03c4\u03b9\u03ba\u03ae \u03ba\u03b1\u03c1\u03b4\u03b9\u03ac \u03c4\u03b7\u03c2 \u03ba\u03bf\u03b9\u03bd\u03cc\u03c4\u03b7\u03c4\u03b1\u03c2, \u03bf \u03c4\u03cc\u03c0\u03bf\u03c2 \u03cc\u03c0\u03bf\u03c5 \u03bf\u03b9 \u03b3\u03b5\u03bd\u03b9\u03ad\u03c2 \u03c3\u03c5\u03bd\u03b1\u03bd\u03c4\u03bf\u03cd\u03bd \u03c4\u03bf\u03bd \u0398\u03b5\u03cc.\u00bb'
  },
 
  // Chapter 2
  ch2_date: {
    sq: 'Fundi i Shekullit XIX – Fillimi i XX',
    en: 'Late 19th – Early 20th Century',
    el: '\u03a4\u03ad\u03bb\u03b7 19\u03bf\u03c5 \u2013 \u0391\u03c1\u03c7\u03ad\u03c2 20\u03bf\u03cd \u0391\u03b9\u03ce\u03bd\u03b1'
  },
  ch2_title: {
    sq: 'Rritja dhe Konsolidimi',
    en: 'Growth and Consolidation',
    el: '\u0391\u03bd\u03ac\u03c0\u03c4\u03c5\u03be\u03b7 \u03ba\u03b1\u03b9 \u0395\u03b4\u03c1\u03b1\u03af\u03c9\u03c3\u03b7'
  },
  ch2_p1: {
    sq: 'Në fund të shekullit të XIX-të dhe fillimin e shekullit të XX-të, Kisha "Profeti Ilia" u bë qendra shpirtërore e lagjes dhe e të gjithë atyre besimtarëve që i përkisnin devotshmërisë orthodhokse të qytetit. Priftërinjtë e kësaj periudhe ishin njerëz të mençur dhe të devotshëm, të cilët jo vetëm shërbenin liturgjikisht, por edhe mësonin fëmijët, kujdeseshin për të varfërit dhe ruheshin traditat e shenjta të Kishës.',
    en: 'In the late 19th and early 20th centuries, the Church of "Prophet Elijah" became the spiritual center of the neighborhood and of all those faithful who belonged to the Orthodox devotion of the city. The priests of this era were wise and devout men who not only served liturgically, but also taught children, cared for the poor, and preserved the holy traditions of the Church.',
    el: '\u03a3\u03c4\u03b1 \u03c4\u03ad\u03bb\u03b7 \u03c4\u03bf\u03c5 19\u03bf\u03c5 \u03ba\u03b1\u03b9 \u03c3\u03c4\u03b9\u03c2 \u03b1\u03c1\u03c7\u03ad\u03c2 \u03c4\u03bf\u03c5 20\u03bf\u03cd \u03b1\u03b9\u03ce\u03bd\u03b1, \u03b7 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb \u03ad\u03b3\u03b9\u03bd\u03b5 \u03c4\u03bf \u03c0\u03bd\u03b5\u03c5\u03bc\u03b1\u03c4\u03b9\u03ba\u03cc \u03ba\u03ad\u03bd\u03c4\u03c1\u03bf \u03c4\u03b7\u03c2 \u03c3\u03c5\u03bd\u03bf\u03b9\u03ba\u03af\u03b1\u03c2. \u039f\u03b9 \u03b9\u03b5\u03c1\u03b5\u03af\u03c2 \u03c4\u03b7\u03c2 \u03b5\u03c0\u03bf\u03c7\u03ae\u03c2 \u03ae\u03c4\u03b1\u03bd \u03c3\u03bf\u03c6\u03bf\u03af \u03ba\u03b1\u03b9 \u03b5\u03c5\u03bb\u03b1\u03b2\u03b5\u03af\u03c2 \u03ac\u03bd\u03b4\u03c1\u03b5\u03c2 \u03c0\u03bf\u03c5 \u03b4\u03af\u03b4\u03b1\u03c3\u03ba\u03b1\u03bd \u03c4\u03b1 \u03c0\u03b1\u03b9\u03b4\u03b9\u03ac, \u03c6\u03c1\u03cc\u03bd\u03c4\u03b9\u03b6\u03b1\u03bd \u03c4\u03bf\u03c5\u03c2 \u03c6\u03c4\u03c9\u03c7\u03bf\u03cd\u03c2 \u03ba\u03b1\u03b9 \u03b4\u03b9\u03b1\u03c6\u03cd\u03bb\u03b1\u03c3\u03c3\u03b1\u03bd \u03c4\u03b9\u03c2 \u03b9\u03b5\u03c1\u03ad\u03c2 \u03c0\u03b1\u03c1\u03b1\u03b4\u03cc\u03c3\u03b5\u03b9\u03c2.'
  },
  ch2_p2: {
    sq: 'Gjatë kësaj periudhe kisha mori formën e saj të plotë — ikonostasi u zbukurua me ikona të çmuara, kambanorja u ngrit dhe tingulli i kambanave filloi të binte mbi qytetin e Korçës si thirrje për lutje dhe si shenjë e pranisë së Perëndisë në mes të popullit. Muzika bizantine, e mësuar brez pas brezi, mbushte muret e gurta të tempullit me himnin e pafundmë të lavdisë hyjnore.',
    en: 'During this period the church took its full form — the iconostasis was adorned with precious icons, the bell tower was raised, and the sound of the bells began to ring over the city of Korçë as a call to prayer and a sign of God\'s presence among the people. Byzantine music, passed down through generations, filled the stone walls of the temple with the endless hymn of divine glory.',
    el: '\u039a\u03b1\u03c4\u03ac \u03c4\u03b7\u03bd \u03c0\u03b5\u03c1\u03af\u03bf\u03b4\u03bf \u03b1\u03c5\u03c4\u03ae \u03b7 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u03b1\u03c0\u03ad\u03ba\u03c4\u03b7\u03c3\u03b5 \u03c4\u03b7\u03bd \u03c0\u03bb\u03ae\u03c1\u03b7 \u03bc\u03bf\u03c1\u03c6\u03ae \u03c4\u03b7\u03c2 \u2014 \u03c4\u03bf \u03c4\u03ad\u03bc\u03c0\u03bb\u03bf \u03c3\u03c4\u03bf\u03bb\u03af\u03c3\u03c4\u03b7\u03ba\u03b5 \u03bc\u03b5 \u03c0\u03bf\u03bb\u03cd\u03c4\u03b9\u03bc\u03b5\u03c2 \u03b5\u03b9\u03ba\u03cc\u03bd\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03c5\u03c8\u03ce\u03b8\u03b7\u03ba\u03b5 \u03c4\u03bf \u03ba\u03b1\u03bc\u03c0\u03b1\u03bd\u03b1\u03c1\u03b9\u03cc. \u0397 \u03b2\u03c5\u03b6\u03b1\u03bd\u03c4\u03b9\u03bd\u03ae \u03bc\u03bf\u03c5\u03c3\u03b9\u03ba\u03ae \u03b3\u03ad\u03bc\u03b9\u03b6\u03b5 \u03c4\u03bf\u03c5\u03c2 \u03c0\u03ad\u03c4\u03c1\u03b9\u03bd\u03bf\u03c5\u03c2 \u03c4\u03bf\u03af\u03c7\u03bf\u03c5\u03c2 \u03bc\u03b5 \u03c4\u03bf\u03bd \u03b1\u03bd\u03b5\u03bd\u03b4\u03cc\u03b5\u03c4\u03bf \u03cd\u03bc\u03bd\u03bf \u03c4\u03b7\u03c2 \u03b8\u03b5\u03af\u03b1\u03c2 \u03b4\u03cc\u03be\u03b1\u03c2.'
  },
  ch2_p3: {
    sq: 'Kjo ishte gjithashtu koha e Rilindjes Kombëtare Shqiptare, dhe Kisha "Profeti Ilia" luajti rolin e saj — jo vetëm si institucion fetar, por edhe si hapësirë ku identiteti shqiptar dhe tradita orthodhokse bashkëjetuan me dinjitet dhe krenari.',
    en: 'This was also the time of the Albanian National Renaissance, and the Church of "Prophet Elijah" played its role — not only as a religious institution, but also as a space where Albanian identity and Orthodox tradition coexisted with dignity and pride.',
    el: '\u0389\u03c4\u03b1\u03bd \u03b5\u03c0\u03af\u03c3\u03b7\u03c2 \u03b7 \u03b5\u03c0\u03bf\u03c7\u03ae \u03c4\u03b7\u03c2 \u0391\u03bb\u03b2\u03b1\u03bd\u03b9\u03ba\u03ae\u03c2 \u0395\u03b8\u03bd\u03b9\u03ba\u03ae\u03c2 \u0391\u03bd\u03b1\u03b3\u03ad\u03bd\u03bd\u03b7\u03c3\u03b7\u03c2, \u03ba\u03b1\u03b9 \u03b7 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb \u03ad\u03c0\u03b1\u03b9\u03be\u03b5 \u03c4\u03bf\u03bd \u03c1\u03cc\u03bb\u03bf \u03c4\u03b7\u03c2 \u03c9\u03c2 \u03c7\u03ce\u03c1\u03bf\u03c2 \u03cc\u03c0\u03bf\u03c5 \u03b7 \u03b1\u03bb\u03b2\u03b1\u03bd\u03b9\u03ba\u03ae \u03c4\u03b1\u03c5\u03c4\u03cc\u03c4\u03b7\u03c4\u03b1 \u03ba\u03b1\u03b9 \u03b7 \u03bf\u03c1\u03b8\u03cc\u03b4\u03bf\u03be\u03b7 \u03c0\u03b1\u03c1\u03ac\u03b4\u03bf\u03c3\u03b7 \u03c3\u03c5\u03bd\u03c5\u03c0\u03ae\u03c1\u03c7\u03b1\u03bd \u03bc\u03b5 \u03b1\u03be\u03b9\u03bf\u03c0\u03c1\u03ad\u03c0\u03b5\u03b9\u03b1.'
  },
 
  // Chapter 3
  ch3_date: {
    sq: 'Shekulli XX — Periudhat e Vështira',
    en: '20th Century — The Difficult Years',
    el: '20\u03cc\u03c2 \u0391\u03b9\u03ce\u03bd\u03b1\u03c2 \u2014 \u03a4\u03b1 \u0394\u03cd\u03c3\u03ba\u03bf\u03bb\u03b1 \u03a7\u03c1\u03cc\u03bd\u03b9\u03b1'
  },
  ch3_title: {
    sq: 'Vitet e Sprovës',
    en: 'Years of Trial',
    el: '\u03a7\u03c1\u03cc\u03bd\u03b9\u03b1 \u0394\u03bf\u03ba\u03b9\u03bc\u03b1\u03c3\u03af\u03b1\u03c2'
  },
  ch3_p1: {
    sq: 'Shekulli i XX-të solli me vete ndryshime të mëdha dhe sprova të rënda për kishën dhe komunitetin e saj. Luftërat ballkanike, dy luftërat botërore dhe më pas instalimi i regjimit komunist në Shqipëri ndikuan thellë në jetën fetare të vendit. Viti 1967 shënoi një pikë të zezë në historinë e kishës — regjimi i Enver Hoxhës ndaloi fenë dhe shpalli Shqipërinë shtetin e parë ateist në botë.',
    en: 'The 20th century brought great changes and heavy trials for the church and its community. The Balkan Wars, two World Wars, and then the installation of the Communist regime in Albania profoundly affected the religious life of the country. The year 1967 marked a dark point in the church\'s history — Enver Hoxha\'s regime banned religion and declared Albania the world\'s first atheist state.',
    el: '\u039f 20\u03cc\u03c2 \u03b1\u03b9\u03ce\u03bd\u03b1\u03c2 \u03ad\u03c6\u03b5\u03c1\u03b5 \u03bc\u03b5\u03b3\u03ac\u03bb\u03b5\u03c2 \u03b1\u03bb\u03bb\u03b1\u03b3\u03ad\u03c2 \u03ba\u03b1\u03b9 \u03b2\u03b1\u03c1\u03b5\u03af\u03b5\u03c2 \u03b4\u03bf\u03ba\u03b9\u03bc\u03b1\u03c3\u03af\u03b5\u03c2. \u03a4\u03bf 1967 \u03c3\u03b7\u03bc\u03b1\u03c4\u03bf\u03b4\u03cc\u03c4\u03b7\u03c3\u03b5 \u03bc\u03b9\u03b1 \u03bc\u03b1\u03cd\u03c1\u03b7 \u03c3\u03b5\u03bb\u03af\u03b4\u03b1 \u2014 \u03c4\u03bf \u03ba\u03bf\u03bc\u03bc\u03bf\u03c5\u03bd\u03b9\u03c3\u03c4\u03b9\u03ba\u03cc \u03ba\u03b1\u03b8\u03b5\u03c3\u03c4\u03ce\u03c2 \u03b1\u03c0\u03b1\u03b3\u03cc\u03c1\u03b5\u03c5\u03c3\u03b5 \u03c4\u03b7 \u03b8\u03c1\u03b7\u03c3\u03ba\u03b5\u03af\u03b1 \u03ba\u03b1\u03b9 \u03b1\u03bd\u03b1\u03ba\u03ae\u03c1\u03c5\u03be\u03b5 \u03c4\u03b7\u03bd \u0391\u03bb\u03b2\u03b1\u03bd\u03af\u03b1 \u03c0\u03c1\u03ce\u03c4\u03bf \u03ac\u03b8\u03b5\u03bf \u03ba\u03c1\u03ac\u03c4\u03bf\u03c2 \u03c3\u03c4\u03bf\u03bd \u03ba\u03cc\u03c3\u03bc\u03bf.'
  },
  ch3_p2: {
    sq: 'Kisha "Profeti Ilia", si shumë kisha të tjera në vend, u mbyll, u profanua dhe u përdor për qëllime të tjera nga pushteti komunist. Besimtarët u detyruan të praktikojnë besimin e tyre fshehurazi, në heshtje dhe me rrezik personal. Por besimi nuk vdiq — ai mbijetoi në zemrat e nënave dhe gjysheve, në lutjet e fshehta të familjeve, në traditën që kalohej me gojë brez pas brezi.',
    en: 'The Church of "Prophet Elijah", like many other churches in the country, was closed, desecrated, and used for other purposes by the Communist authorities. The faithful were forced to practice their faith secretly, in silence and at personal risk. But faith did not die — it survived in the hearts of mothers and grandmothers, in the secret prayers of families, in the tradition passed down orally from generation to generation.',
    el: '\u0397 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb, \u03cc\u03c0\u03c9\u03c2 \u03c0\u03bf\u03bb\u03bb\u03ad\u03c2 \u03ac\u03bb\u03bb\u03b5\u03c2, \u03ad\u03ba\u03bb\u03b5\u03b9\u03c3\u03b5 \u03ba\u03b1\u03b9 \u03b2\u03b5\u03b2\u03b7\u03bb\u03ce\u03b8\u03b7\u03ba\u03b5. \u039f\u03b9 \u03c0\u03b9\u03c3\u03c4\u03bf\u03af \u03b1\u03bd\u03b1\u03b3\u03ba\u03ac\u03c3\u03c4\u03b7\u03ba\u03b1\u03bd \u03bd\u03b1 \u03b1\u03c3\u03ba\u03bf\u03cd\u03bd \u03c4\u03b7\u03bd \u03c0\u03af\u03c3\u03c4\u03b7 \u03ba\u03c1\u03c5\u03c6\u03ac. \u0391\u03bb\u03bb\u03ac \u03b7 \u03c0\u03af\u03c3\u03c4\u03b7 \u03b4\u03b5\u03bd \u03c0\u03ad\u03b8\u03b1\u03bd\u03b5 \u2014 \u03b5\u03c0\u03ad\u03b6\u03b7\u03c3\u03b5 \u03c3\u03c4\u03b9\u03c2 \u03ba\u03b1\u03c1\u03b4\u03b9\u03ad\u03c2 \u03c4\u03c9\u03bd \u03bc\u03b7\u03c4\u03ad\u03c1\u03c9\u03bd \u03ba\u03b1\u03b9 \u03b3\u03b9\u03b1\u03b3\u03b9\u03ac\u03b4\u03c9\u03bd.'
  },
  ch3_p3: {
    sq: 'Edhe në ato vite të errëta, kisha qëndroi si ndërtesë — muret e saj të gurta mbijetuan, edhe pse heshtura dhe të braktisura nga funksioni i tyre i shenjtë. Ato mure prisnin ditën kur kambana do të binte sërish.',
    en: 'Even in those dark years, the church stood as a building — its stone walls survived, though silent and abandoned from their sacred function. Those walls waited for the day when the bells would ring again.',
    el: '\u0391\u03ba\u03cc\u03bc\u03b7 \u03ba\u03b1\u03b9 \u03b5\u03ba\u03b5\u03af\u03bd\u03b1 \u03c4\u03b1 \u03c3\u03ba\u03bf\u03c4\u03b5\u03b9\u03bd\u03ac \u03c7\u03c1\u03cc\u03bd\u03b9\u03b1, \u03b7 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u03c0\u03b1\u03c1\u03ad\u03bc\u03b5\u03b9\u03bd\u03b5 \u03c9\u03c2 \u03ba\u03c4\u03af\u03c1\u03b9\u03bf \u2014 \u03bf\u03b9 \u03c0\u03ad\u03c4\u03c1\u03b9\u03bd\u03bf\u03b9 \u03c4\u03bf\u03af\u03c7\u03bf\u03b9 \u03c4\u03b7\u03c2 \u03b5\u03c0\u03ad\u03b6\u03b7\u03c3\u03b1\u03bd, \u03b1\u03bd \u03ba\u03b1\u03b9 \u03c3\u03b9\u03c9\u03c0\u03b7\u03bb\u03bf\u03af. \u0395\u03ba\u03b5\u03af\u03bd\u03bf\u03b9 \u03bf\u03b9 \u03c4\u03bf\u03af\u03c7\u03bf\u03b9 \u03c0\u03b5\u03c1\u03af\u03bc\u03b5\u03bd\u03b1\u03bd \u03c4\u03b7\u03bd \u03b7\u03bc\u03ad\u03c1\u03b1 \u03c0\u03bf\u03c5 \u03bf\u03b9 \u03ba\u03b1\u03bc\u03c0\u03ac\u03bd\u03b5\u03c2 \u03b8\u03b1 \u03c7\u03c4\u03c5\u03c0\u03bf\u03cd\u03c3\u03b1\u03bd \u03be\u03b1\u03bd\u03ac.'
  },
 
  // Chapter 4
  ch4_date: { sq: 'Pas Vitit 1990', en: 'After 1990', el: '\u039c\u03b5\u03c4\u03ac \u03c4\u03bf 1990' },
  ch4_title: {
    sq: 'Ringjallja',
    en: 'Revival',
    el: '\u0391\u03bd\u03b1\u03b3\u03ad\u03bd\u03bd\u03b7\u03c3\u03b7'
  },
  ch4_p1: {
    sq: 'Me rënien e komunizmit dhe hapjen e Shqipërisë pas vitit 1990, filloi ringjallja e jetës fetare në vend. Kisha "Profeti Ilia" u hap sërish, u riparua dhe u kthye në atë që gjithmonë kishte qenë — shtëpia e Perëndisë dhe qendra shpirtërore e komunitetit orthodhoks të Korçës. Besimtarët u kthyen me lot gëzimi, me lutje dhe me falënderim.',
    en: 'With the fall of communism and the opening of Albania after 1990, the revival of religious life in the country began. The Church of "Prophet Elijah" was reopened, restored, and returned to what it had always been — the house of God and the spiritual center of the Orthodox community of Korçë. The faithful returned with tears of joy, with prayers and thanksgiving.',
    el: '\u039c\u03b5 \u03c4\u03b7\u03bd \u03c0\u03c4\u03ce\u03c3\u03b7 \u03c4\u03bf\u03c5 \u03ba\u03bf\u03bc\u03bc\u03bf\u03c5\u03bd\u03b9\u03c3\u03bc\u03bf\u03cd \u03bc\u03b5\u03c4\u03ac \u03c4\u03bf 1990, \u03be\u03b5\u03ba\u03af\u03bd\u03b7\u03c3\u03b5 \u03b7 \u03b1\u03bd\u03b1\u03b3\u03ad\u03bd\u03bd\u03b7\u03c3\u03b7 \u03c4\u03b7\u03c2 \u03b8\u03c1\u03b7\u03c3\u03ba\u03b5\u03c5\u03c4\u03b9\u03ba\u03ae\u03c2 \u03b6\u03c9\u03ae\u03c2. \u0397 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb \u03be\u03b1\u03bd\u03ac\u03bd\u03bf\u03b9\u03be\u03b5, \u03b1\u03c0\u03bf\u03ba\u03b1\u03c4\u03b1\u03c3\u03c4\u03ac\u03b8\u03b7\u03ba\u03b5 \u03ba\u03b1\u03b9 \u03b5\u03c0\u03ad\u03c3\u03c4\u03c1\u03b5\u03c8\u03b5 \u03c3\u03b5 \u03b1\u03c5\u03c4\u03cc \u03c0\u03bf\u03c5 \u03c0\u03ac\u03bd\u03c4\u03b1 \u03ae\u03c4\u03b1\u03bd \u2014 \u03bf \u03bf\u03af\u03ba\u03bf\u03c2 \u03c4\u03bf\u03c5 \u0398\u03b5\u03bf\u03cd. \u039f\u03b9 \u03c0\u03b9\u03c3\u03c4\u03bf\u03af \u03b5\u03c0\u03ad\u03c3\u03c4\u03c1\u03b5\u03c8\u03b1\u03bd \u03bc\u03b5 \u03b4\u03ac\u03ba\u03c1\u03c5\u03b1 \u03c7\u03b1\u03c1\u03ac\u03c2 \u03ba\u03b1\u03b9 \u03b5\u03c5\u03c7\u03b1\u03c1\u03b9\u03c3\u03c4\u03af\u03b1.'
  },
  ch4_p2: {
    sq: 'Nën kujdesin e Kishës Orthodhokse Autoqefale të Shqipërisë dhe udhëheqjen e Kryepiskopit Anastas, i cili i dha një impuls të ri gjithë jetës kishtare shqiptare, kisha filloi një fazë të re. U restaurua ikonostasi, u pikturuan ikona të reja, u formua kori dhe shërbesat hyjnore u rimorën me të gjithë solemnitetin e tyre liturgjik.',
    en: 'Under the care of the Autocephalous Orthodox Church of Albania and the leadership of Archbishop Anastas, who gave a new impulse to all Albanian church life, the church entered a new phase. The iconostasis was restored, new icons were painted, a choir was formed, and the divine services were resumed with all their liturgical solemnity.',
    el: '\u03a5\u03c0\u03cc \u03c4\u03b7\u03bd \u03b5\u03c0\u03af\u03b2\u03bb\u03b5\u03c8\u03b7 \u03c4\u03b7\u03c2 \u0391\u03c5\u03c4\u03bf\u03ba\u03ad\u03c6\u03b1\u03bb\u03b7\u03c2 \u039f\u03c1\u03b8\u03cc\u03b4\u03bf\u03be\u03b7\u03c2 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1\u03c2 \u0391\u03bb\u03b2\u03b1\u03bd\u03af\u03b1\u03c2 \u03ba\u03b1\u03b9 \u03c4\u03b7\u03bd \u03b7\u03b3\u03b5\u03c3\u03af\u03b1 \u03c4\u03bf\u03c5 \u0391\u03c1\u03c7\u03b9\u03b5\u03c0\u03b9\u03c3\u03ba\u03cc\u03c0\u03bf\u03c5 \u0391\u03bd\u03b1\u03c3\u03c4\u03ac\u03c3\u03b9\u03bf\u03c5, \u03b7 \u03b5\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u03bc\u03c0\u03ae\u03ba\u03b5 \u03c3\u03b5 \u03bd\u03ad\u03b1 \u03c6\u03ac\u03c3\u03b7. \u0391\u03c0\u03bf\u03ba\u03b1\u03c4\u03b1\u03c3\u03c4\u03ac\u03b8\u03b7\u03ba\u03b5 \u03c4\u03bf \u03c4\u03ad\u03bc\u03c0\u03bb\u03bf, \u03b6\u03c9\u03b3\u03c1\u03b1\u03c6\u03af\u03c3\u03c4\u03b7\u03ba\u03b1\u03bd \u03bd\u03ad\u03b5\u03c2 \u03b5\u03b9\u03ba\u03cc\u03bd\u03b5\u03c2 \u03ba\u03b1\u03b9 \u03b5\u03c0\u03b1\u03bd\u03b1\u03bb\u03ae\u03c6\u03b8\u03b7\u03ba\u03b1\u03bd \u03bf\u03b9 \u03b8\u03b5\u03af\u03b5\u03c2 \u03b1\u03ba\u03bf\u03bb\u03bf\u03c5\u03b8\u03af\u03b5\u03c2.'
  },
  ch4_p3: {
    sq: 'Sot, Kisha "Profeti Ilia" është jo vetëm një monument historik dhe shpirtëror, por edhe një bashkësi e gjallë besimtarësh të çdo moshe, që mblidhen çdo të diel dhe festë për të ndarë besimin, traditën dhe dashurinë e tyre për Krishtin dhe Kishën e Tij.',
    en: 'Today, the Church of "Prophet Elijah" is not only a historical and spiritual monument, but also a living community of believers of all ages, who gather every Sunday and feast day to share their faith, tradition, and love for Christ and His Church.',
    el: '\u03a3\u03ae\u03bc\u03b5\u03c1\u03b1, \u03b7 \u0395\u03ba\u03ba\u03bb\u03b7\u03c3\u03af\u03b1 \u00ab\u03a0\u03c1\u03bf\u03c6\u03ae\u03c4\u03b7\u03c2 \u0397\u03bb\u03af\u03b1\u03c2\u00bb \u03b5\u03af\u03bd\u03b1\u03b9 \u03cc\u03c7\u03b9 \u03bc\u03cc\u03bd\u03bf \u03b9\u03c3\u03c4\u03bf\u03c1\u03b9\u03ba\u03cc \u03ba\u03b1\u03b9 \u03c0\u03bd\u03b5\u03c5\u03bc\u03b1\u03c4\u03b9\u03ba\u03cc \u03bc\u03bd\u03b7\u03bc\u03b5\u03af\u03bf, \u03b1\u03bb\u03bb\u03ac \u03ba\u03b1\u03b9 \u03bc\u03b9\u03b1 \u03b6\u03c9\u03bd\u03c4\u03b1\u03bd\u03ae \u03ba\u03bf\u03b9\u03bd\u03cc\u03c4\u03b7\u03c4\u03b1 \u03c0\u03b9\u03c3\u03c4\u03ce\u03bd \u03ba\u03ac\u03b8\u03b5 \u03b7\u03bb\u03b9\u03ba\u03af\u03b1\u03c2, \u03c0\u03bf\u03c5 \u03bc\u03b1\u03b6\u03b5\u03cd\u03bf\u03bd\u03c4\u03b1\u03b9 \u03ba\u03ac\u03b8\u03b5 \u039a\u03c5\u03c1\u03b9\u03b1\u03ba\u03ae \u03ba\u03b1\u03b9 \u03b5\u03bf\u03c1\u03c4\u03ae.'
  },
 
  // Quote 2
  quote2: {
    sq: '"Profeti Ilia ishte i zjarrtë në besimin e tij — dhe kjo kishë, e cila mban emrin e tij, vazhdon të mbajë gjallë atë zjarr shpirtëror në zemrat e besimtarëve korçarë."',
    en: '"Prophet Elijah was fervent in his faith — and this church, which bears his name, continues to keep that spiritual fire alive in the hearts of the faithful of Korçë."',

// ════════════════════════════════════════════════════════════════
//  ENGINE
// ════════════════════════════════════════════════════════════════
 
function setLang(lang) {
  // Buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn[onclick="setLang(\'' + lang + '\')"]').classList.add('active');
 
  // Label
  document.getElementById('lang-label-text').textContent = T.lang_label[lang];
 
  // html lang attr
  document.documentElement.lang = lang;
 
  // Render all [data-t] elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const entry = T[key];
    if (!entry) return;
    const text = entry[lang] || entry['sq'] || '';
    el.innerHTML = text.replace(/\n/g, '<br>');
  });
}
 
// Lightbox
const photos = [{ src: null },{ src: null },{ src: null },{ src: null }];
let current = 0;
 
function openLightbox(i) {
  current = i;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function changePhoto(dir) {
  current = (current + dir + photos.length) % photos.length;
  renderLightbox();
}
function renderLightbox() {
  const wrap = document.getElementById('lightboxImgWrap');
  const p = photos[current];
  wrap.innerHTML = p.src
    ? '<img src="' + p.src + '" alt="Foto historike">'
    : '<div class="lightbox-placeholder"></div>';
  document.getElementById('lightboxCounter').textContent = (current + 1) + ' / ' + photos.length;
}
 
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') changePhoto(1);
  if (e.key === 'ArrowLeft') changePhoto(-1);
  if (e.key === 'Escape') closeLightbox();
});
 
// Photo fade-in
const obs = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting)
      setTimeout(function() { entry.target.classList.add('visible'); }, entry.target.dataset.delay || 0);
  });
}, { threshold: 0.08 });
 
document.querySelectorAll('.photo-item').forEach(function(el, i) {
  el.dataset.delay = i * 100;
  obs.observe(el);
});
 
// Initial render
setLang('sq');
</script>

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5EDD8;
    --deep-blue: #1A1F3C;
    --mid-blue: #2D3561;
    --warm-dark: #0F0E0B;
    --parchment: #FAF6EE;
    --stone: #8B7D6B;
    --red-byzantine: #8B1A1A;
    --cream: #F2EDE4;
    --text-dark: #1A1715;
    --text-mid: #4A4035;
    --text-light: #9A8E7E;
    --border: rgba(201,168,76,0.25);
    --shadow: 0 4px 30px rgba(15,14,11,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--parchment);
    color: var(--text-dark);
    overflow-x: hidden;
  }
  * { user-select: none; -webkit-user-select: none; }

  /* ─── LANGUAGE BAR ─── */
  .lang-bar { background: var(--deep-blue); padding: 8px 0; }
  .lang-bar .container { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
  .lang-bar-left { display: flex; align-items: center; gap: 10px; }
  .instagram-link { display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.7); transition: color 0.25s; text-decoration: none; }
  .instagram-link:hover { color: #fff; }
  .lang-bar-right { display: flex; align-items: center; gap: 8px; }
  .lang-label { font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; margin-right: 4px; }
  .lang-btn { background: transparent; border: 1px solid rgba(201,168,76,0.4); color: rgba(255,255,255,0.65); padding: 4px 12px; font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.25s; border-radius: 2px; }
  .lang-btn:hover, .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--deep-blue); }

  /* ─── HEADER ─── */
  header { background: var(--deep-blue); position: relative; overflow: hidden; }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 50% -20%, rgba(201,168,76,0.12) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 29 L43 44 L30 35 L17 44 L22 29 L10 20 L25 20Z' fill='none' stroke='rgba(201,168,76,0.06)' stroke-width='1'/%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 28px 40px; }
  .church-identity { display: flex; align-items: center; gap: 20px; }
  .cross-icon { width: 52px; height: 52px; flex-shrink: 0; }
  .church-name-block h1 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; line-height: 1.2; }
  .church-name-block p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 13.5px; color: rgba(255,255,255,0.5); margin-top: 3px; letter-spacing: 0.5px; }

  /* ─── NAVIGATION ─── */
  nav { background: var(--mid-blue); border-top: 1px solid rgba(201,168,76,0.2); border-bottom: 1px solid rgba(201,168,76,0.2); position: sticky; top: 0; z-index: 100; }
  .nav-inner { display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 0; flex-wrap: wrap; }
  .nav-link { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.65); text-decoration: none; padding: 16px 20px; position: relative; transition: color 0.25s; white-space: nowrap; }
  .nav-link::after { content: ''; position: absolute; bottom: 0; left: 50%; right: 50%; height: 2px; background: var(--gold); transition: left 0.3s, right 0.3s; }
  .nav-link:hover { color: var(--gold-light); }
  .nav-link:hover::after, .nav-link.active::after { left: 15%; right: 15%; }
  .nav-link.active { color: var(--gold-light); }

  /* ─── PAGE TITLE ─── */
  .page-title-section {
    background: var(--deep-blue);
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .page-title-section::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 100% at 50% 0%, rgba(201,168,76,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .page-title-section .eyebrow {
    font-family: 'Noto Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .page-title-section .eyebrow::before,
  .page-title-section .eyebrow::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .page-title-section h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .page-title-section .title-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 18px auto 0;
  }

  /* ─── GALLERY GRID ─── */
  .gallery-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, var(--deep-blue), var(--mid-blue));
  }

  .gallery-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(26,31,60,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .gallery-item:hover::after { opacity: 1; }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
    display: block;
  }

  .gallery-item:hover img { transform: scale(1.07); }

  .gallery-item .zoom-icon {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.3s, transform 0.3s;
  }

  .gallery-item:hover .zoom-icon {
    opacity: 1;
    transform: scale(1);
  }

  .gallery-item .caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 14px 12px;
    z-index: 2;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .gallery-item:hover .caption {
    opacity: 1;
    transform: translateY(0);
  }

  .gallery-item .caption span {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }

  /* placeholder when no image */
  .gallery-item .placeholder-icon {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: rgba(201,168,76,0.2);
    font-size: 42px;
    pointer-events: none;
  }
  .gallery-item .placeholder-icon span {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.25);
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(10,12,25,0.96);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }

  .lightbox-backdrop {
    position: absolute;
    inset: 0;
    cursor: pointer;
  }

  .lightbox-content {
    position: relative;
    z-index: 1;
    max-width: 90vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lightbox-img-wrap {
    position: relative;
    max-width: 90vw;
    max-height: 82vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox-img-wrap img {
    max-width: 85vw;
    max-height: 80vh;
    object-fit: contain;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow: 0 20px 80px rgba(0,0,0,0.7);
    display: block;
    transition: opacity 0.2s;
  }

  /* placeholder in lightbox */
  .lightbox-placeholder {
    width: min(600px, 85vw);
    height: min(450px, 70vh);
    background: linear-gradient(135deg, var(--deep-blue), var(--mid-blue));
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: rgba(201,168,76,0.3);
    font-size: 60px;
  }
  .lightbox-placeholder p {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.3);
  }

  .lightbox-close {
    position: fixed;
    top: 24px;
    right: 28px;
    width: 44px;
    height: 44px;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
    color: var(--gold-light);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 2;
    line-height: 1;
  }
  .lightbox-close:hover {
    background: var(--gold);
    color: var(--deep-blue);
    transform: rotate(90deg);
  }

  .lightbox-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 48px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 50%;
    color: var(--gold-light);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 2;
  }
  .lightbox-arrow:hover { background: var(--gold); color: var(--deep-blue); }
  .lightbox-arrow.prev { left: 20px; }
  .lightbox-arrow.next { right: 20px; }

  .lightbox-caption {
    margin-top: 16px;
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    letter-spacing: 0.3px;
  }

  .lightbox-counter {
    margin-top: 8px;
    font-family: 'Noto Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
  }

  /* ─── FOOTER ─── */
  footer { background: var(--warm-dark); padding: 60px 0 0; }
  .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px 50px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 50px; }
  .footer-brand p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 14.5px; color: rgba(255,255,255,0.35); margin-top: 16px; line-height: 1.7; }
  .church-name-block-footer h1 { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; }
  .footer-col h5 { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .footer-links { list-style: none; }
  .footer-links li { padding: 6px 0; }
  .footer-links a { font-family: 'EB Garamond', serif; font-size: 15px; color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 8px; }
  .footer-links a::before { content: '›'; color: var(--gold); opacity: 0; transition: opacity 0.2s; }
  .footer-links a:hover { color: rgba(255,255,255,0.8); }
  .footer-links a:hover::before { opacity: 1; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding: 20px 40px; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .footer-bottom p { font-family: 'Noto Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 1100px) { .gallery-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 800px) {
    .gallery-grid { grid-template-columns: repeat(3, 1fr); }
    .footer-inner { grid-template-columns: 1fr 1fr; }
    .lightbox-arrow { display: none; }
  }
  @media (max-width: 540px) {
    .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    .gallery-section { padding: 40px 16px 60px; }
    .footer-inner { grid-template-columns: 1fr; }
    .page-title-section { padding: 40px 20px 36px; }
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .gallery-item { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.3s; }
  .gallery-item.visible { opacity: 1; transform: translateY(0); }
  .gallery-item:hover { box-shadow: 0 10px 40px rgba(201,168,76,0.15); }
</style>
</head>

<script>
// ── Gallery data ──
// Replace src with real image paths when you have photos.
// captions are shown in the lightbox below the image.
const photos = [
  { src: null, caption: 'Kisha nga jashtë' },
  { src: null, caption: 'Ikonostasi' },
  { src: null, caption: 'Kryqi i Madh' },
  { src: null, caption: 'Shërbesa Hyjnore' },
  { src: null, caption: 'Festa e Profetit Ilia – 20 Korrik' },
  { src: null, caption: 'Pashkë 2025' },
  { src: null, caption: 'Krishtlindjet' },
  { src: null, caption: 'Vajtimi i Krishtit' },
  { src: null, caption: 'Pamja e brendshme' },
  { src: null, caption: 'Kori Bizantine' },
];

let current = 0;

function openLightbox(index) {
  current = index;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function changePhoto(dir) {
  current = (current + dir + photos.length) % photos.length;
  renderLightbox();
}

function renderLightbox() {
  const wrap = document.getElementById('lightboxImgWrap');
  const p = photos[current];

  if (p.src) {
    wrap.innerHTML = `<img src="${p.src}" alt="${p.caption}">`;
  } else {
    // show styled placeholder
    
    wrap.innerHTML = `
      <div class="lightbox-placeholder">
        
        <p>Foto ${current + 1}</p>
      </div>`;
  }


  document.getElementById('lightboxCounter').textContent = `${current + 1} / ${photos.length}`;
}

// keyboard nav
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') changePhoto(1);
  if (e.key === 'ArrowLeft') changePhoto(-1);
  if (e.key === 'Escape') closeLightbox();
});

// scroll fade-in
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      setTimeout(() => entry.target.classList.add('visible'), entry.target.dataset.delay || 0);
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.gallery-item').forEach((el, i) => {
  el.dataset.delay = (i % 5) * 80;
  observer.observe(el);
});

// lang switcher (minimal — just swaps button state for now)
function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.documentElement.lang = lang;
}
</script>

<style>

    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5EDD8;
    --deep-blue: #1A1F3C;
    --mid-blue: #2D3561;
    --warm-dark: #0F0E0B;
    --parchment: #FAF6EE;
    --stone: #8B7D6B;
    --red-byzantine: #8B1A1A;
    --cream: #F2EDE4;
    --text-dark: #1A1715;
    --text-mid: #4A4035;
    --text-light: #9A8E7E;
    --border: rgba(201,168,76,0.25);
    --shadow: 0 4px 30px rgba(15,14,11,0.15);

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

  * { user-select: none; -webkit-user-select: none; }

  /* ─── LANGUAGE BAR ─── */
  .lang-bar { background: var(--deep-blue); padding: 8px 0; }
  .lang-bar .container { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; }
  .lang-bar-left { display: flex; align-items: center; gap: 10px; }
  .instagram-link { display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.7); transition: color 0.25s; text-decoration: none; }
  .instagram-link:hover { color: #fff; }
  .lang-bar-right { display: flex; align-items: center; gap: 8px; }
  .lang-label { font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #fff; margin-right: 4px; }
  .lang-btn { background: transparent; border: 1px solid rgba(201,168,76,0.4); color: rgba(255,255,255,0.65); padding: 4px 12px; font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.25s; border-radius: 2px; }
  .lang-btn:hover, .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--deep-blue); }

  /* ─── HEADER ─── */
  header { background: var(--deep-blue); position: relative; overflow: hidden; }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 50% -20%, rgba(201,168,76,0.12) 0%, transparent 70%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 29 L43 44 L30 35 L17 44 L22 29 L10 20 L25 20Z' fill='none' stroke='rgba(201,168,76,0.06)' stroke-width='1'/%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }
  .header-inner { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; padding: 28px 40px; }
  .church-identity { display: flex; align-items: center; gap: 20px; }
  .cross-icon { width: 52px; height: 52px; flex-shrink: 0; }
  .church-name-block h1 { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; line-height: 1.2; }
  .church-name-block p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 13.5px; color: rgba(255,255,255,0.5); margin-top: 3px; letter-spacing: 0.5px; }

  /* ─── NAVIGATION ─── */
  nav { background: var(--mid-blue); border-top: 1px solid rgba(201,168,76,0.2); border-bottom: 1px solid rgba(201,168,76,0.2); position: sticky; top: 0; z-index: 100; }
  .nav-inner { display: flex; align-items: center; justify-content: center; padding: 0 40px; gap: 0; flex-wrap: wrap; }
  .nav-link { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; color: rgba(255,255,255,0.65); text-decoration: none; padding: 16px 20px; position: relative; transition: color 0.25s; white-space: nowrap; }
  .nav-link::after { content: ''; position: absolute; bottom: 0; left: 50%; right: 50%; height: 2px; background: var(--gold); transition: left 0.3s, right 0.3s; }
  .nav-link:hover { color: var(--gold-light); }
  .nav-link:hover::after, .nav-link.active::after { left: 15%; right: 15%; }
  .nav-link.active { color: var(--gold-light); }

  /* ─── HERO ─── */
  .hero { background: linear-gradient(170deg, rgba(26,31,60,0.85) 0%, rgba(19,24,58,0.80) 50%, rgba(10,13,30,0.85) 100%), url("Assets/kisha_main.jpg") center/cover no-repeat; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 40px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%); }
  .hero-arch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 500px; height: 300px; border: 1px solid rgba(201,168,76,0.08); border-radius: 50% 50% 0 0 / 100% 100% 0 0; pointer-events: none; }
  .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; width: 100%; }
  .hero-eyebrow { font-family: 'Noto Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .hero-eyebrow::before, .hero-eyebrow::after { content: ''; display: block; width: 40px; height: 1px; background: var(--gold); opacity: 0.5; }
  .hero h2 { font-family: 'Cinzel', serif; font-size: clamp(30px, 5vw, 54px); font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 10px; text-shadow: 0 2px 40px rgba(201,168,76,0.2); }
  .hero h2 span { color: var(--gold-light); display: block; }
  .hero-subtitle { font-family: 'EB Garamond', serif; font-style: italic; font-size: 20px; color: rgba(255,255,255,0.55); margin: 16px 0 36px; line-height: 1.6; }
  .hero-divider { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 36px; }
  .hero-divider span { width: 60px; height: 1px; background: var(--gold); opacity: 0.4; display: block; }
  .hero-divider svg { opacity: 0.7; }
  .hero-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--gold); color: var(--deep-blue); font-family: 'Cinzel', serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 14px 32px; text-decoration: none; transition: all 0.3s; border-radius: 2px; }
  .hero-cta:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }

  /* ─── TICKER ─── */
  .ticker { background: var(--red-byzantine); padding: 11px 0; overflow: hidden; }
  .ticker-inner { display: flex; align-items: center; }
  .ticker-label { background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.9); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 0 20px; white-space: nowrap; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.2); margin-right: 24px; height: 100%; display: flex; align-items: center; gap: 8px; }
  .ticker-content { overflow: hidden; flex: 1; }
  .ticker-text { color: rgba(255,255,255,0.9); font-family: 'EB Garamond', serif; font-size: 15px; white-space: nowrap; animation: ticker-scroll 30s linear infinite; display: inline-block; }
  @keyframes ticker-scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

  /* ─── SECTION HEADINGS ─── */
  .section-heading { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .section-heading h3 { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 700; color: var(--deep-blue); letter-spacing: 1px; white-space: nowrap; }
  .section-heading .rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold) 0%, transparent 100%); }
  .section-heading .ornament { color: var(--gold); font-size: 18px; flex-shrink: 0; }

  /* ─── POST CARDS ─── */
  .posts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 50px; }
  .post-card { background: #fff; border: 1px solid var(--border); overflow: hidden; transition: all 0.3s; cursor: pointer; position: relative; }
  .post-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--gold); transition: height 0.3s; }
  .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .post-card:hover::before { height: 100%; }
  .post-card-img { width: 100%; height: 180px; background: linear-gradient(135deg, var(--deep-blue) 0%, var(--mid-blue) 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .post-card-img .img-placeholder { color: rgba(255,255,255,0.15); font-size: 48px; }
  .post-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .post-card:hover .post-card-img img { transform: scale(1.05); }
  .post-card-tag { position: absolute; top: 12px; left: 12px; background: var(--red-byzantine); color: #fff; font-family: 'Noto Sans', sans-serif; font-size: 9px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 1px; }
  .post-card-body { padding: 20px 22px 22px; }
  .post-card-date { font-family: 'Noto Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .post-card-title { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; color: var(--deep-blue); line-height: 1.5; margin-bottom: 10px; }
  .post-card-excerpt { font-family: 'EB Garamond', serif; font-size: 14.5px; color: var(--text-mid); line-height: 1.65; }
  .read-more { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; color: var(--gold); font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: gap 0.2s; }
  .read-more:hover { gap: 10px; }
  .post-card.featured { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; }
  .post-card.featured .post-card-img { height: 100%; min-height: 240px; }
  .post-card.featured .post-card-body { padding: 30px 32px; }
  .post-card.featured .post-card-title { font-size: 20px; margin-bottom: 14px; }
  .post-card.featured .post-card-excerpt { font-size: 16px; }

  /* ─── HISTORY ─── */
  .history-section { background: var(--deep-blue); padding: 80px 0; position: relative; overflow: hidden; }
  .history-section::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.08); }
  .history-section::after { content: ''; position: absolute; bottom: -80px; left: -80px; width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(201,168,76,0.06); }
  .history-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 70px; align-items: center; position: relative; z-index: 1; }
  .history-text .eyebrow { font-family: 'Noto Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
  .history-text h3 { font-family: 'Cinzel', serif; font-size: 34px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 22px; }
  .history-text p { font-family: 'EB Garamond', serif; font-size: 17.5px; line-height: 1.85; color: rgba(255,255,255,0.65); margin-bottom: 16px; }
  .history-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 36px; }
  .stat-box { border: 1px solid rgba(201,168,76,0.2); padding: 20px; text-align: center; background: rgba(255,255,255,0.03); transition: background 0.3s; }
  .stat-box:hover { background: rgba(201,168,76,0.07); }
  .stat-box .num { font-family: 'Cinzel', serif; font-size: 36px; font-weight: 900; color: var(--gold-light); display: block; margin-bottom: 4px; }
  .stat-box .lbl { font-family: 'Noto Sans', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .history-img-frame { width: 100%; aspect-ratio: 4/5; background: linear-gradient(135deg, var(--mid-blue), #0A0D1E); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 80px; color: rgba(201,168,76,0.1); position: relative; }
  .history-img-frame::before { content: ''; position: absolute; top: -12px; right: -12px; width: 100%; height: 100%; border: 1px solid rgba(201,168,76,0.12); pointer-events: none; }
  .history-img-frame img { width: 100%; height: 100%; object-fit: cover; }

  /* ─── CATEGORIES ─── */
  .categories-strip { background: var(--cream); padding: 60px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .categories-strip-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
  .cat-heading { text-align: center; margin-bottom: 40px; }
  .cat-heading h3 { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; color: var(--deep-blue); margin-bottom: 8px; }
  .cat-heading p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 16px; color: var(--text-light); }
  .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .cat-card { background: #fff; border: 1px solid var(--border); padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.3s; text-decoration: none; display: block; position: relative; overflow: hidden; }
  .cat-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--gold); transform: scaleX(0); transition: transform 0.3s; }
  .cat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
  .cat-card:hover::after { transform: scaleX(1); }
  .cat-icon { font-size: 36px; display: block; margin-bottom: 14px; filter: grayscale(30%); }
  .cat-card h4 { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; color: var(--deep-blue); margin-bottom: 8px; letter-spacing: 0.5px; }
  .cat-card p { font-family: 'EB Garamond', serif; font-size: 13.5px; color: var(--text-light); line-height: 1.5; }
  .cat-count { display: inline-block; background: var(--gold-pale); color: var(--stone); font-family: 'Noto Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; margin-top: 12px; }

  /* ─── FOOTER ─── */
  footer { background: var(--warm-dark); padding: 60px 0 0; }
  .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px 50px; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 50px; }
  .footer-brand .church-name-block h1 { font-size: 18px; }
  .footer-brand p { font-family: 'EB Garamond', serif; font-style: italic; font-size: 14.5px; color: rgba(255,255,255,0.35); margin-top: 16px; line-height: 1.7; }
  .footer-col h5 { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .footer-links { list-style: none; }
  .footer-links li { padding: 6px 0; font-family: 'EB Garamond', serif; font-size: 15px; color: rgba(255,255,255,0.45); }
  .footer-links a { font-family: 'EB Garamond', serif; font-size: 15px; color: rgba(255,255,255,0.45); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 8px; }
  .footer-links a::before { content: '›'; color: var(--gold); opacity: 0; transition: opacity 0.2s; }
  .footer-links a:hover { color: rgba(255,255,255,0.8); }
  .footer-links a:hover::before { opacity: 1; }
  .footer-bottom { border-top: 1px solid rgba(255,255,255,0.06); padding: 20px 40px; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .footer-bottom p { font-family: 'Noto Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 0.5px; }
  .footer-bottom .orthodoxy-motto { font-family: 'EB Garamond', serif; font-style: italic; font-size: 13px; color: rgba(201,168,76,0.5); }

  /* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  .history-inner { grid-template-columns: 1fr; gap: 30px; }
  .history-img-frame { aspect-ratio: 16/9; }
  .history-text h3 { font-size: 24px; }
  .categories-grid { grid-template-columns: 1fr 1fr; }
  .footer-inner { grid-template-columns: 1fr 1fr; }
  .header-inner { flex-direction: column; gap: 16px; text-align: center; }
  .nav-inner { overflow-x: auto; justify-content: flex-start; padding: 0 20px; }
}

@media (max-width: 600px) {
  .lang-bar .container { padding: 0 16px; }
  .lang-bar-left { gap: 6px; }
  .instagram-link svg { width: 18px; height: 18px; }
  .header-inner { padding: 20px; }
  .church-name-block h1 { font-size: 16px; }
  .church-name-block p { font-size: 12px; }
  .hero { padding: 60px 20px; min-height: 70vh; }
  .hero h2 { font-size: 28px; }
  .hero-subtitle { font-size: 15px; }
  .hero-cta { padding: 12px 24px; font-size: 11px; }
  .hero-arch { display: none; }
  .history-inner { padding: 0 20px; gap: 24px; }
  .history-inner { direction: ltr !important; }
  .history-text h3 { font-size: 22px; }
  .history-text p { font-size: 15px; }
  .history-stats { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-box .num { font-size: 26px; }
  .history-img-frame { aspect-ratio: 4/3; }
  .categories-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-card { padding: 18px 12px; }
  .cat-icon { font-size: 28px; }
  .cat-card h4 { font-size: 11px; }
  .cat-card p { font-size: 12px; }
  .footer-inner { grid-template-columns: 1fr; gap: 30px; padding: 0 20px 40px; }
  .footer-bottom { padding: 16px 20px; }
  .footer-bottom p { font-size: 10px; }
  .nav-link { font-size: 10px; padding: 14px 12px; letter-spacing: 1px; }
}

@media (max-width: 380px) {
  .hero h2 { font-size: 22px; }
  .categories-grid { grid-template-columns: 1fr; }
  .history-stats { grid-template-columns: 1fr 1fr; }
  .church-name-block h1 { font-size: 14px; }
}

  /* ─── ANIMATIONS ─── */
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .hero-content > * { animation: fadeInUp 0.8s ease both; }
  .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
  .hero-content > *:nth-child(2) { animation-delay: 0.25s; }
  .hero-content > *:nth-child(3) { animation-delay: 0.4s; }
  .hero-content > *:nth-child(4) { animation-delay: 0.55s; }
  .hero-content > *:nth-child(5) { animation-delay: 0.65s; }
</style>

let currentLang = 'sq';

function setLang(lang) {
  currentLang = lang;

  // Buttons
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');

  // Label
  document.getElementById('lang-label-text').textContent = T.lang_label[lang];

  // html lang attr
  document.documentElement.lang = lang;

  // Render all [data-t] elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    const entry = T[key];
    if (!entry) return;
    const text = entry[lang] || entry['sq'] || '';
    // Use innerHTML so <br> and &nbsp; in ticker/quotes render correctly
    el.innerHTML = text.replace(/\n/g, '<br>');
  });

  // Restart ticker animation
  const ticker = document.querySelector('.ticker-text');
  if (ticker) {
    ticker.style.animation = 'none';
    ticker.offsetHeight; // reflow
    ticker.style.animation = '';
  }
}

window.addEventListener('scroll', () => {
  let current = '';
  sections.forEach(sec => {
    if (window.scrollY >= sec.offsetTop - 100) current = sec.id;
  });
  navLinks.forEach(link => {
    link.classList.remove('active');
    if (link.getAttribute('href') === '#' + current) link.classList.add('active');
  });
});

// ── Fade in on scroll ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = '1';
      entry.target.style.transform = 'translateY(0)';
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.post-card, .cat-card, .stat-box').forEach(el => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(20px)';
  el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  observer.observe(el);
});

// ── Initial render ──
setLang('sq');
</script>

</body>
